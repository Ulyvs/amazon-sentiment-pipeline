<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flux Temps Réel</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; }
        h1 { color: #e94560; text-align: center; }
        .nav { text-align: center; margin-bottom: 20px; }
        .nav a { color: white; margin: 0 15px; text-decoration: none;
                 background: #16213e; padding: 8px 20px; border-radius: 5px; }
        .nav a:hover { background: #e94560; }
        .card { background: #16213e; border-radius: 10px; padding: 15px;
                margin: 10px 0; border-left: 5px solid #e94560; }
        .positive { border-left-color: #2ecc71; }
        .neutral  { border-left-color: #f39c12; }
        .negative { border-left-color: #e74c3c; }
        .badge { padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        .badge.positive { background: #2ecc71; color: black; }
        .badge.neutral  { background: #f39c12; color: black; }
        .badge.negative { background: #e74c3c; color: white; }
        #stats { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .stat-box { background: #16213e; padding: 15px 30px;
                    border-radius: 10px; text-align: center; }
        .stat-box h2 { margin: 0; font-size: 2em; }
    </style>
</head>
<body>
    <h1>🔴 Flux Temps Réel — Analyse des Avis Amazon</h1>

    <div class="nav">
        <a href="/">🔴 Live</a>
        <a href="/dashboard">📊 Dashboard</a>
    </div>

    <div id="stats">
        <div class="stat-box">
            <h2 id="total">0</h2>
            <p>Total</p>
        </div>
        <div class="stat-box" style="border-top: 3px solid #2ecc71">
            <h2 id="positive" style="color:#2ecc71">0</h2>
            <p>Positifs</p>
        </div>
        <div class="stat-box" style="border-top: 3px solid #f39c12">
            <h2 id="neutral" style="color:#f39c12">0</h2>
            <p>Neutres</p>
        </div>
        <div class="stat-box" style="border-top: 3px solid #e74c3c">
            <h2 id="negative" style="color:#e74c3c">0</h2>
            <p>Négatifs</p>
        </div>
    </div>

    <div id="feed"></div>

    <script>
        function updateFeed() {
            fetch('/api/latest')
                .then(r => r.json())
                .then(data => {
                    const feed = document.getElementById('feed');
                    feed.innerHTML = '';
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = `card ${item.predicted_label}`;
                        div.innerHTML = `
                            <div style="display:flex; justify-content:space-between">
                                <strong>📦 ${item.ProductId}</strong>
                                <span class="badge ${item.predicted_label}">
                                    ${item.predicted_label.toUpperCase()}
                                </span>
                            </div>
                            <p style="color:#aaa; margin:8px 0">
                                ${item.Text ? item.Text.substring(0, 150) + '...' : ''}
                            </p>
                            <small style="color:#666">🕐 ${item.timestamp}</small>
                        `;
                        feed.appendChild(div);
                    });
                });

            fetch('/api/stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('total').textContent    = data.total;
                    document.getElementById('positive').textContent = data.positive;
                    document.getElementById('neutral').textContent  = data.neutral;
                    document.getElementById('negative').textContent = data.negative;
                });
        }

        // Rafraîchir toutes les 2 secondes
        updateFeed();
        setInterval(updateFeed, 2000);
    </script>
</body>
</html>
