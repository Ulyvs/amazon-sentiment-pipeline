services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: amazon-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: amazon-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: amazon-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://amazon-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  mongodb:
    image: mongo:latest
    container_name: amazon-mongodb
    ports:
      - "27017:27017"
    volumes:
      - amazon_mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: amazon-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: amazon-mongodb
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

  spark-master:
    image: apache/spark:latest
    container_name: amazon-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8090:8080"
      - "7077:7077"
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./models:/opt/spark-models

  spark-worker:
    image: apache/spark:latest
    container_name: amazon-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://amazon-spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./models:/opt/spark-models

  flask-app:
    image: python:3.10-slim
    container_name: amazon-flask
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://amazon-mongodb:27017/
    command: >
      sh -c "pip install flask pymongo &&
             python app.py"

volumes:
  amazon_mongo_data: